model:
  model_name_or_path: runs/sft/dense-0p5b
  architecture: dense
  tokenizer_name_or_path: runs/sft/dense-0p5b
  torch_dtype: bfloat16
data:
  dataset_name: open-r1/Big-Math-RL-Verified-Processed
  dataset_path_override: data/prepared/grpo
  train_split: train
  eval_split: validation
  prompt_column: problem
  solution_column: solution
  answer_column: answer
  source_column: source
  difficulty_column: difficulty
  output_dir: data/prepared/grpo
  train_size: 10000
  eval_size: 1000
  decontaminate_with:
    - HuggingFaceH4/MATH-500
    - openai/gsm8k
training:
  output_dir: runs/grpo/dense-0p5b
  seed: 42
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-6
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_steps: 500
  logging_steps: 5
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  max_seq_length: 1024
  gradient_checkpointing: true
  bf16: true
  report_to: []
grpo:
  beta: 0.01
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 256
  temperature: 0.9
  loss_type: dapo
  use_vllm: false
  reward:
    exact_match_reward: 1.0
    boxed_parse_reward: 0.05
    incorrect_reward: 0.0
